<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Buddies</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #06061a;
        color: #9ca3af;
        font-family: monospace;
      }
      h1 {
        color: #8be0ff;
        font-size: 20px;
        letter-spacing: 4px;
        margin: 0;
      }
      canvas {
        border: 4px solid #27348f;
        border-radius: 4px;
      }
      p { margin: 0; font-size: 13px; }
      kbd {
        background: #1f2545;
        border-radius: 3px;
        padding: 1px 5px;
        color: #e5e7eb;
      }
      .online { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
      .online button {
        background: #1f2545; color: #8be0ff; border: 1px solid #3b4ec9;
        border-radius: 4px; font-family: monospace; font-size: 13px;
        padding: 8px 14px; cursor: pointer;
      }
      .online button:active { background: #3b4ec9; }
      #join-form { display: flex; gap: 6px; }
      #join-code {
        width: 70px; text-transform: uppercase; text-align: center; letter-spacing: 3px;
        background: #11173a; color: #fde047; border: 1px solid #3b4ec9;
        border-radius: 4px; font-family: monospace; font-size: 14px; padding: 6px;
      }
      #online-status { color: #fde047; min-height: 16px; }
    </style>
  </head>
  <body>
    <h1>BUBBLE BUDDIES</h1>
    <div class="online">
      <button id="create-room">PLAY ONLINE — START A ROOM</button>
      <form id="join-form">
        <input id="join-code" maxlength="4" placeholder="CODE" autocomplete="off" />
        <button type="submit">JOIN</button>
      </form>
    </div>
    <p id="online-status"></p>
    <canvas id="game"></canvas>
    <p>
      solo practice above ·
      <kbd>←</kbd><kbd>→</kbd> move · <kbd>Z</kbd>/<kbd>Space</kbd> jump ·
      <kbd>X</kbd> blow bubble
    </p>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/home.ts"></script>
  </body>
</html>
