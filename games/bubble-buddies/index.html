<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Buddies</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #06061a;
        color: #9ca3af;
        font-family: monospace;
      }
      h1 {
        color: #8be0ff;
        font-size: 20px;
        letter-spacing: 4px;
        margin: 0;
      }
      canvas {
        border: 4px solid #27348f;
        border-radius: 4px;
      }
      p { margin: 0; font-size: 13px; }
      kbd {
        background: #1f2545;
        border-radius: 3px;
        padding: 1px 5px;
        color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <h1>BUBBLE BUDDIES</h1>
    <canvas id="game"></canvas>
    <p>
      <kbd>←</kbd><kbd>→</kbd> move · <kbd>Z</kbd>/<kbd>Space</kbd> jump ·
      <kbd>X</kbd> blow bubble
    </p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
