<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
    <meta name="theme-color" content="#0F1222" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bubble Buddies" />
    <title>Bubble Buddies</title>
  </head>
  <body>
    <div id="stage">
      <div id="arena">
        <header id="hud">
          <div class="hud-row">
            <span class="hud-title">BUBBLE BUDDIES</span>
          </div>
          <div class="hud-row">
            <!-- Code entry leads (netcode SPEC "Join surfaces"): pinned-app
                 users type the room code — iOS PWAs can't capture links. -->
            <form id="join-form">
              <input id="join-code" maxlength="4" placeholder="CODE" autocomplete="off"
                     inputmode="text" autocapitalize="characters" />
              <button type="submit" class="chip-btn primary">JOIN</button>
            </form>
            <button id="create-room" class="chip-btn">START A ROOM</button>
            <span id="install-slot"></span>
          </div>
          <p id="online-status"></p>
        </header>

        <canvas id="game"></canvas>
        <button id="start-gate">
          <span class="gate-bubble">▶</span>
          <span class="gate-label touch-only">TAP TO START</span>
          <span class="gate-label keys-only">CLICK TO START</span>
          <small>solo practice — grab buddies with PLAY ONLINE</small>
        </button>

        <div id="dpad" class="ctl-zone" hidden></div>
        <div id="abzone" class="ctl-zone" hidden></div>

        <p class="keys keys-only">
          <kbd>←</kbd><kbd>→</kbd> move · <kbd>Z</kbd>/<kbd>Space</kbd> jump ·
          <kbd>X</kbd> blow bubble
        </p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/home.ts"></script>
  </body>
</html>
