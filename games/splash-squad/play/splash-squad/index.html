<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0F1222" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Splash Squad" />
    <title>Splash Squad — Online</title>
    <style>
      /* Minimal lobby overlay; the arena/canvas/controls come from shell.css. */
      #name-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #0f1222;
        color: #f2efe9;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 24px;
        z-index: 20;
      }
      #name-overlay.hidden { display: none; }
      #name-overlay h1 { color: #3df5a6; letter-spacing: 1px; }
      #name-overlay input {
        font-size: 18px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 2px solid #3df5a6;
        background: #161a2e;
        color: #f2efe9;
        text-align: center;
      }
      #name-overlay button {
        font-size: 18px;
        padding: 10px 22px;
        border-radius: 8px;
        border: 0;
        background: #3df5a6;
        color: #0f1222;
        font-weight: 700;
      }
      #roster { color: #4cc9f0; font-size: 14px; min-height: 18px; }
      .room-chip { color: #ffd166; }
      #status { color: #f2efe9; font-size: 13px; min-height: 16px; }
      #status.bad { color: #ff6b6b; }
      .hud-row { display: flex; gap: 10px; align-items: center; }
      #share { background: none; border: 1px solid #4cc9f0; color: #4cc9f0; border-radius: 6px; padding: 2px 8px; }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="arena">
        <header id="hud">
          <div class="hud-row">
            <span class="hud-title">SPLASH SQUAD</span>
            <span class="room-chip">ROOM <b id="room-code">····</b></span>
            <button id="share">INVITE</button>
          </div>
          <p id="status"></p>
        </header>

        <canvas id="game"></canvas>

        <div id="dpad" class="ctl-zone" hidden></div>
        <div id="abzone" class="ctl-zone" hidden></div>

        <p class="keys keys-only">
          <kbd>←</kbd><kbd>→</kbd> move · <kbd>↑</kbd><kbd>↓</kbd> aim ·
          <kbd>Z</kbd>/<kbd>Space</kbd> jump · <kbd>X</kbd> soak
        </p>
      </div>
    </div>

    <div id="name-overlay">
      <h1>SPLASH SQUAD</h1>
      <p>Backyard co-op — soak the wind-up robots together.</p>
      <p id="roster"></p>
      <input id="name-input" maxlength="12" placeholder="your name" autocomplete="off" />
      <button id="join-btn">JOIN THE SQUAD</button>
      <small>Tip: start a video call first, then tap INVITE to share the room.</small>
    </div>

    <script type="module" src="/src/play.ts"></script>
  </body>
</html>
