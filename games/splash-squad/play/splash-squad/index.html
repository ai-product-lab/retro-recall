<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
    <meta name="theme-color" content="#0F1222" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Splash Squad" />
    <title>Splash Squad — Online</title>
    <style>
      /* Minimal lobby overlay; the arena/canvas/controls come from shell.css. */
      #name-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* flex-start + scroll: on short/landscape screens the avatar grid + name
           + JOIN overflow, so the overlay must scroll (centering would clip the
           top and strand JOIN off-screen). pan-y re-enables touch scroll, which
           body{touch-action:none} otherwise suppresses. */
        justify-content: flex-start;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
        gap: 12px;
        background: #0f1222;
        color: #f2efe9;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        z-index: 20;
      }
      /* Keep the lobby vertically centered when it does fit, without breaking
         scroll when it doesn't. */
      #name-overlay::before,
      #name-overlay::after { content: ''; margin: auto; }
      #name-overlay.hidden { display: none; }
      #name-overlay h1 { color: #3df5a6; letter-spacing: 1px; }
      #name-overlay input {
        font-size: 18px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 2px solid #3df5a6;
        background: #161a2e;
        color: #f2efe9;
        text-align: center;
      }
      #name-overlay button {
        font-size: 18px;
        padding: 10px 22px;
        border-radius: 8px;
        border: 0;
        background: #3df5a6;
        color: #0f1222;
        font-weight: 700;
      }
      #roster { color: #4cc9f0; font-size: 14px; min-height: 18px; }
      .room-chip { color: #ffd166; }
      #status { color: #f2efe9; font-size: 13px; min-height: 16px; }
      #status.bad { color: #ff6b6b; }
      .hud-row { display: flex; gap: 10px; align-items: center; }
      #share { background: none; border: 1px solid #4cc9f0; color: #4cc9f0; border-radius: 6px; padding: 8px 14px; min-height: 44px; }
      #avatar-pick { display: flex; flex-direction: column; align-items: center; gap: 8px; }
      .avatar-label { font-size: 13px; color: #8a8fa3; margin: 0; }
      #avatar-options { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 360px; }
      .avatar-opt { width: 56px; height: 56px; padding: 0; border: 2px solid #2a3158; border-radius: 8px; background: #161a2e; cursor: pointer; }
      .avatar-opt canvas { width: 100%; height: 100%; image-rendering: pixelated; display: block; }
      .avatar-opt.selected { border-color: #3df5a6; }
      .avatar-opt.broken { opacity: 0.3; }
      #avatar-photo { background: #161a2e; color: #4cc9f0; border: 1px solid #4cc9f0; border-radius: 8px; font-weight: 600; padding: 8px 14px; }
      #avatar-status { font-size: 12px; color: #ffd166; min-height: 14px; margin: 0; }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="arena">
        <header id="hud">
          <div class="hud-row">
            <span class="hud-title">SPLASH SQUAD</span>
            <span class="room-chip">ROOM <b id="room-code">····</b></span>
            <button id="share">INVITE</button>
          </div>
          <p id="status"></p>
        </header>

        <canvas id="game"></canvas>

        <div id="dpad" class="ctl-zone" hidden></div>
        <div id="abzone" class="ctl-zone" hidden></div>

        <p class="keys keys-only">
          <kbd>←</kbd><kbd>→</kbd> move · <kbd>↑</kbd><kbd>↓</kbd> aim ·
          <kbd>Z</kbd>/<kbd>Space</kbd> jump · <kbd>X</kbd> soak
        </p>
      </div>
    </div>

    <div id="name-overlay">
      <h1>SPLASH SQUAD</h1>
      <p>Backyard co-op — soak the wind-up robots together.</p>
      <p id="roster"></p>
      <div id="avatar-pick">
        <p class="avatar-label">pick your buddy — or snap a photo to become one</p>
        <div id="avatar-options"></div>
        <button id="avatar-photo" type="button">📷 use my photo</button>
        <input id="avatar-file" type="file" accept="image/*" capture="user" hidden />
        <p id="avatar-status"></p>
      </div>
      <input id="name-input" maxlength="12" placeholder="your name" autocomplete="off" />
      <button id="join-btn">JOIN THE SQUAD</button>
      <small>Tip: start a video call first, then tap INVITE to share the room.</small>
    </div>

    <script type="module" src="/src/play.ts"></script>
  </body>
</html>
