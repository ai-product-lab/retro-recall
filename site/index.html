<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1222" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Retro Recall" />
    <meta name="description" content="A web arcade of original games inspired by the classics. Old games. New players." />
    <title>Retro Recall — the arcade</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="shell">
      <header id="masthead">
        <div class="brand">
          <span class="wordmark">RETRO&nbsp;RECALL<span class="brand-bubble" aria-hidden="true"></span></span>
          <span class="tagline">Old games. New players.</span>
        </div>
        <button id="join-chip" class="chip-btn" type="button">⟐ JOIN CODE</button>
      </header>

      <main>
        <section id="game-grid" aria-label="Games"><!-- tiles injected by home.ts --></section>
      </main>

      <footer id="colophon">
        <span>Built in the open.</span>
        <a href="/guide/" class="guide-link">Field Guide ▸</a>
      </footer>
    </div>

    <script type="module" src="/src/home.ts"></script>
  </body>
</html>
